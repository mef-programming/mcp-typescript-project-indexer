<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TypeScript Project Indexer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Managed MCP Server</p>
          <h1>TypeScript Project Indexer</h1>
        </div>
        <div class="status-pill" id="statusPill">offline</div>
      </header>

      <section class="stats" aria-label="Indexer status">
        <article><span>Files</span><strong id="filesValue">-</strong></article>
        <article><span>Symbols</span><strong id="symbolsValue">-</strong></article>
        <article><span>Imports</span><strong id="importsValue">-</strong></article>
        <article><span>Lines</span><strong id="linesValue">-</strong></article>
        <article><span>State</span><strong id="stateValue">-</strong></article>
        <article><span>Command</span><strong id="commandValue">-</strong></article>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Commands</h2>
        </div>
        <div class="command-grid">
          <button data-command="build">Build Index</button>
          <button data-command="module_map">Module Map</button>
          <button data-command="reload_index">Reload</button>
        </div>
        <div class="command-state" id="commandState">Command idle</div>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-header">
            <h2>Details</h2>
            <button id="refreshButton">Refresh</button>
          </div>
          <dl class="details" id="detailsList"></dl>
        </article>

        <article class="panel">
          <div class="panel-header">
            <h2>Server Log</h2>
            <button id="clearLog">Clear</button>
          </div>
          <pre class="log" id="serverLog"></pre>
        </article>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
